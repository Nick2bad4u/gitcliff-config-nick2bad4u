# This file is generated by npm run presets:generate. Do not edit it directly.
# Adapted from https://github.com/orhun/git-cliff/blob/main/examples/github.toml
# Shared parsing is derived from ../cliff.toml.
# yaml-language-server: $schema=https://www.schemastore.org/git-cliff.json

"$schema"   = "https://www.schemastore.org/git-cliff.json"
name        = "github"
description = "Flat GitHub release-note output with pull request titles, authors, contributors, and comparison links."
version     = "1.0.0"

[changelog]
    body = """
{%- macro subject(commit) -%}
{%- set first_line = commit.message | split(pat="\n") | first | trim -%}
{%- if commit.scope and not commit.conventional -%}
{{- first_line | replace_regex(from="^.*\\[[a-z]+\\][!:]?\\s*\\([^)]+\\)[!:]?\\s*", to="") | trim -}}
{%- else -%}
{{- first_line -}}
{%- endif -%}
{%- endmacro -%}
{%- macro remote_url() -%}
https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}
{%- endmacro -%}
## What's Changed{% if version %} in {{ version | trim_start_matches(pat="v") }}{% endif %}
{% for commit in commits %}
{% if commit.remote.pr_title %}{% set display_message = commit.remote.pr_title | trim %}{% else %}{% set display_message = self::subject(commit=commit) %}{% endif %}
* {% if not commit.remote.pr_title and commit.scope %}*({{ commit.scope }})* {% endif %}{% if commit.breaking %}[**breaking**] {% endif %}{{ display_message }}{% if commit.remote.username %} by @{{ commit.remote.username }}{% endif %}{% if commit.remote.pr_number %} in [#{{ commit.remote.pr_number }}]({{ self::remote_url() }}/pull/{{ commit.remote.pr_number }}){% endif %}
{% endfor %}
{% if github %}
{% set new_contributors = github.contributors | filter(attribute="is_first_time", value=true) %}
{% if new_contributors | length > 0 %}
### New Contributors
{% for contributor in new_contributors %}
{% if contributor.username %}* @{{ contributor.username }} made their first contribution{% if contributor.pr_number %} in [#{{ contributor.pr_number }}]({{ self::remote_url() }}/pull/{{ contributor.pr_number }}){% endif %}
{% endif %}
{% endfor %}
{% endif %}
{% endif %}
{% if version and previous and previous.version %}
**Full Changelog**: {{ self::remote_url() }}/compare/{{ previous.version }}...{{ version }}
{% endif %}
"""
    footer = "<!-- generated by git-cliff -->"
    # Remove leading and trailing whitespace from the changelog content
    trim = true
    # postprocessors
    postprocessors = [
        # { pattern = 'your-package-name', replace = "[your-package-name](https://github.com/${remote.github.owner}/${remote.github.repo})" }, # example repository URL replacement
        { pattern = "Merge branch", replace = "[chore] Merge Branch" }, # replace merge branch commit messages
        { pattern = "merge branch", replace = "[chore] Merge Branch" }, # replace merge branch commit messages
        # Clean up Dependabot messages - remove verbose table content
        { pattern = 'Bump the.*?group with \d+ updates.*?(\n\n|\|.*?\|.*?\n)*', replace = "[dependency] Update dependency group" },
        { pattern = 'Bumps the npm-all group.*?with \d+ updates.*?(\n\n|\|.*?\|.*?\n)*', replace = "[dependency] Update npm dependencies" },
        { pattern = '\[dependency\] \[chore\] Bump the.*?with \d+ updates.*?(\n\n|\|.*?\|.*?\n)*', replace = "[dependency] Update dependencies" },

        # Clean up individual package bump messages
        { pattern = 'Bump ([a-zA-Z0-9@\-\/]+) from.*?to.*?(\n\n.*?)*', replace = "[dependency] Update $1" },
        { pattern = 'Bump ([a-zA-Z0-9@\-\/]+) to.*?(\n\n.*?)*', replace = "[dependency] Update $1" },
        { pattern = 'Bumps \[([^\]]+)\].*?from.*?to.*?(\n\n.*?)*', replace = "[dependency] Update $1" },
        # Remove git trailers that look noisy in rendered changelog entries
        { pattern = '\n\nSigned-off-by:[^\n\r]*(\r?\nSigned-off-by:[^\n\r]*)*', replace = "" },
        # Collapse control-flow whitespace while preserving one Markdown blank line
        { pattern = '(?:\r?\n[ \t]*){2,}\r?\n', replace = "\n\n" }
    ]
    render_always = true
    # render body even when there are no releases to process
    # render_always = true
    # output file path
    # output = "test.md"

[git]
    # parse the commits based on https://www.conventionalcommits.org
    conventional_commits = true
    # filter out the commits that are not conventional
    filter_unconventional = false
    # process each line of a commit as an individual commit
    split_commits = false
    # use branch tags to group releases for diverged branches
    use_branch_tags = false
    # recurse into submodules to find commits
    recurse_submodules = true
    # commit_preprocessors = [
    #   # Replace issue numbers
    #   # This regex pattern matches issue references in the format "(optional text #123)"
    #   # and replaces them with a markdown link to the issue, e.g.,
    #   # "[#123](https://github.com/${remote.github.owner}/${remote.github.repo}/issues/123)".
    #   { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "([#${2}](https://github.com/${remote.github.owner}/${remote.github.repo}/issues/${2}))"},
    #   # Example: Check spelling of the commit with the `typos` tool.
    #   # For more information, visit: https://github.com/crate-ci/typos
    #   { pattern = '.*', replace_command = 'typos --write-changes -' },
    #   # If the spelling is incorrect, it will be automatically fixed.
    #   { pattern = '.*', replace_command = 'typos --write-changes -' },
    # ]
    # regex for parsing and grouping commits
    # Commit parsers support both raw Unicode Gitmojis and :shortcode: forms
    # from .github/copilot-commit-message-instructions.md.
    commit_parsers = [
        # Skip noisy commit types
        { message = "^Merge branch", skip = true },
        { message = "^Merge pull request", skip = true },
        { message = "^merge branch", skip = true },
        { message = "^chore\\(pr\\)", skip = true },
        { message = "^chore\\(pull\\)", skip = true },
        { message = "^chore\\(release\\): prepare for", skip = true },

        # Security-related (keep separate from general dependencies)
        { message = "^(?:🔒️|🔒|🔐|🛂|:lock:|:closed_lock_with_key:|:passport_control:).*\\[[a-z]+\\][!:]?\\s*\\(([^)]+)\\)", group = "<!-- 12 -->🛡️ Security", scope = "${1}" },
        { message = "^(🔒️|🔒|🔐|🛂|:lock:|:closed_lock_with_key:|:passport_control:)", group = "<!-- 12 -->🛡️ Security" },
        { body = ".*security.*", group = "<!-- 12 -->🛡️ Security" },
        { message = ".*security.*", group = "<!-- 12 -->🛡️ Security" },

        # Dependency-related commits (emoji and bot/fallback patterns)
        { message = "^(?:⬆️|⬆|⬇️|⬇|📌|➕|➖|:arrow_up:|:arrow_down:|:pushpin:|:heavy_plus_sign:|:heavy_minus_sign:).*\\[[a-z]+\\][!:]?\\s*\\(([^)]+)\\)", group = "<!-- 11 -->📦 Dependencies", scope = "${1}" },
        { message = "^(⬆️|⬆|⬇️|⬇|📌|➕|➖|:arrow_up:|:arrow_down:|:pushpin:|:heavy_plus_sign:|:heavy_minus_sign:)", group = "<!-- 11 -->📦 Dependencies" },
        { message = "^chore\\(deps.*\\)", group = "<!-- 11 -->📦 Dependencies" },
        { message = ".*dependabot.*", group = "<!-- 11 -->📦 Dependencies" },
        { message = ".*npm-all.*", group = "<!-- 11 -->📦 Dependencies" },
        { message = "^Bump [a-zA-Z0-9@\\-\\/]+", group = "<!-- 11 -->📦 Dependencies" },
        { message = "^Bump the.*group with \\d+ updates", group = "<!-- 11 -->📦 Dependencies" },
        { message = "^Bumps \\[.*\\]", group = "<!-- 11 -->📦 Dependencies" },
        { message = "^Bumps the.*group with \\d+ updates", group = "<!-- 11 -->📦 Dependencies" },
        { message = "^\\[dependency\\]", group = "<!-- 11 -->📦 Dependencies" },

        # Revert commits
        { message = "^(?:⏪️|⏪|:rewind:).*\\[[a-z]+\\][!:]?\\s*\\(([^)]+)\\)", group = "<!-- 10 -->⏪ Reverts", scope = "${1}" },
        { message = "^(⏪️|⏪|:rewind:)", group = "<!-- 10 -->⏪ Reverts" },
        { message = "^revert", group = "<!-- 10 -->⏪ Reverts" },

        # Commit-type tags (accept any leading emoji/shortcode)
        { message = "^.*\\[feat\\][!:]?\\s*\\(([^)]+)\\)", group = "<!-- 00 -->✨ Features", scope = "${1}" },
        { message = "^.*\\[feat\\]", group = "<!-- 00 -->✨ Features" },
        { message = "^.*\\[fix\\][!:]?\\s*\\(([^)]+)\\)", group = "<!-- 01 -->🛠️ Bug Fixes", scope = "${1}" },
        { message = "^.*\\[fix\\]", group = "<!-- 01 -->🛠️ Bug Fixes" },
        { message = "^.*\\[refactor\\][!:]?\\s*\\(([^)]+)\\)", group = "<!-- 02 -->🚜 Refactor", scope = "${1}" },
        { message = "^.*\\[refactor\\]", group = "<!-- 02 -->🚜 Refactor" },
        { message = "^.*\\[docs\\][!:]?\\s*\\(([^)]+)\\)", group = "<!-- 03 -->📝 Documentation", scope = "${1}" },
        { message = "^.*\\[docs\\]", group = "<!-- 03 -->📝 Documentation" },
        { message = "^.*\\[perf\\][!:]?\\s*\\(([^)]+)\\)", group = "<!-- 04 -->⚡ Performance", scope = "${1}" },
        { message = "^.*\\[perf\\]", group = "<!-- 04 -->⚡ Performance" },
        { message = "^.*\\[style\\][!:]?\\s*\\(([^)]+)\\)", group = "<!-- 05 -->🎨 Styling", scope = "${1}" },
        { message = "^.*\\[style\\]", group = "<!-- 05 -->🎨 Styling" },
        { message = "^.*\\[test\\][!:]?\\s*\\(([^)]+)\\)", group = "<!-- 06 -->🧪 Testing", scope = "${1}" },
        { message = "^.*\\[test\\]", group = "<!-- 06 -->🧪 Testing" },
        { message = "^.*\\[chore\\][!:]?\\s*\\(([^)]+)\\)", group = "<!-- 07 -->🧹 Chores", scope = "${1}" },
        { message = "^.*\\[chore\\]", group = "<!-- 07 -->🧹 Chores" },
        { message = "^.*\\[ci\\][!:]?\\s*\\(([^)]+)\\)", group = "<!-- 08 -->👷 CI/CD", scope = "${1}" },
        { message = "^.*\\[ci\\]", group = "<!-- 08 -->👷 CI/CD" },
        { message = "^.*\\[build\\][!:]?\\s*\\(([^)]+)\\)", group = "<!-- 09 -->🔧 Build System", scope = "${1}" },
        { message = "^.*\\[build\\]", group = "<!-- 09 -->🔧 Build System" },
        { message = "^.*\\[revert\\][!:]?\\s*\\(([^)]+)\\)", group = "<!-- 10 -->⏪ Reverts", scope = "${1}" },
        { message = "^.*\\[revert\\]", group = "<!-- 10 -->⏪ Reverts" },

        # Full Gitmoji mapping fallbacks (for commits without explicit [type])
        { message = "^(✨|🎉|🌱|🥚|🚩|👔|💥|:sparkles:|:tada:|:seedling:|:egg:|:triangular_flag_on_post:|:necktie:|:boom:)", group = "<!-- 00 -->✨ Features" },
        { message = "^(🐛|🚑️|🚑|🥅|🩹|:bug:|:ambulance:|:goal_net:|:adhesive_bandage:)", group = "<!-- 01 -->🛠️ Bug Fixes" },
        { message = "^(🚜|♻️|♻|🚚|🏗️|🏗|🧱|:tractor:|:recycle:|:truck:|:building_construction:|:bricks:)", group = "<!-- 02 -->🚜 Refactor" },
        { message = "^(📝|✏️|✏|💡|💬|📄|:memo:|:pencil2:|:bulb:|:speech_balloon:|:page_facing_up:)", group = "<!-- 03 -->📝 Documentation" },
        { message = "^(⚡️|⚡|🧵|:zap:|:thread:)", group = "<!-- 04 -->⚡ Performance" },
        { message = "^(🎨|💄|💫|📱|♿️|♿|:art:|:artist_palette:|:lipstick:|:dizzy:|:iphone:|:wheelchair:)", group = "<!-- 05 -->🎨 Styling" },
        { message = "^(🧪|✅|🤡|📸|🦺|:test_tube:|:white_check_mark:|:clown_face:|:camera_flash:|:safety_vest:)", group = "<!-- 06 -->🧪 Testing" },
        { message = "^(🧹|🔥|🚨|🙈|🗑️|🗑|⚰️|🔊|🔇|🍱|🍻|👽️|👽|🔀|💩|:broom:|:fire:|:rotating_light:|:see_no_evil:|:wastebasket:|:coffin:|:loud_sound:|:mute:|:bento:|:beers:|:alien:|:twisted_rightwards_arrows:|:poop:)", group = "<!-- 07 -->🧹 Chores" },
        { message = "^(👷|💚|🚧|🚀|🩺|:construction_worker:|:green_heart:|:construction:|:rocket:|:stethoscope:)", group = "<!-- 08 -->👷 CI/CD" },
        { message = "^(🔧|🔨|📦️|📦|:wrench:|:hammer:|:package:)", group = "<!-- 09 -->🔧 Build System" },

        # Remaining supported Gitmojis that are best treated as miscellaneous
        { message = "^(🔖|🌐|📈|🗃️|🗃|👥|🚸|⚗️|⚗|🔍️|🔍|🏷️|🏷|🧐|🧑‍💻|💸|✈️|✈|🦖|:bookmark:|:globe_with_meridians:|:chart_with_upwards_trend:|:card_file_box:|:busts_in_silhouette:|:children_crossing:|:alembic:|:mag:|:label:|:monocle_face:|:technologist:|:money_with_wings:|:airplane:|:t-rex:)", group = "<!-- 13 -->🛠️ Other Changes" },

        # Fallback patterns for conventional commits without emojis
        { message = "^build", group = "<!-- 09 -->🔧 Build System" },
        { message = "^ci", group = "<!-- 08 -->👷 CI/CD" },
        { message = "^docs?", group = "<!-- 03 -->📝 Documentation" },
        { message = "^feat", group = "<!-- 00 -->✨ Features" },
        { message = "^fix", group = "<!-- 01 -->🛠️ Bug Fixes" },
        { message = "^perf", group = "<!-- 04 -->⚡ Performance" },
        { message = "^refactor", group = "<!-- 02 -->🚜 Refactor" },
        { message = "^style", group = "<!-- 05 -->🎨 Styling" },
        { message = "^test", group = "<!-- 06 -->🧪 Testing" },
        { message = "^chore", group = "<!-- 07 -->🧹 Chores" },

        # CI/CD file changes
        { message = ".*\\.ya?ml", group = "<!-- 08 -->👷 CI/CD" },
        { message = ".*workflow.*", group = "<!-- 08 -->👷 CI/CD" },

        # Catch-all for miscellaneous changes
        { message = ".*", group = "<!-- 13 -->🛠️ Other Changes" }
    ]
    # keep the default behavior where explicitly skipped breaking commits stay skipped
    protect_breaking_commits = false
    # filter out the commits that are not matched by commit parsers
    filter_commits = false
    # sort the tags topologically
    topo_order = false
    # sort the commits inside sections by oldest/newest order
    # possible values: "oldest" (chronological order) or "newest" (reverse chronological order)
    sort_commits = "newest"

[remote]
    # Keep GitHub metadata available by default so PR authors and first-time
    # contributors can render. Use --offline for deterministic local previews.
    offline = false

    # GitHub repository metadata used by the changelog template.
    # Shared-config consumers should set GITHUB_REPO or pass --github-repo
    # owner/repo so links point at the consuming repository.
    [remote.github]
        owner = "Nick2bad4u"
        repo  = "gitcliff-config-nick2bad4u"
        # api_url = "https://api.github.com"
        # native_tls = false
